<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Nutrition Redis Leaderboard</title>
  <style>
    :root {
      --ink: #14213d;
      --surface: #f8f6f2;
      --panel: #fffefb;
      --accent: #d68c45;
      --accent-strong: #b86f2f;
      --success: #1d7f56;
      --danger: #a12626;
      --muted: #6f7a8a;
      --line: #e6ddcf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(214, 140, 69, 0.22), transparent 38%),
        radial-gradient(circle at 80% 0%, rgba(20, 33, 61, 0.18), transparent 35%),
        linear-gradient(180deg, #f7efe0 0%, #f8f6f2 45%, #ffffff 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(20, 33, 61, 0.12);
      overflow: hidden;
      animation: slideIn 420ms ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header {
      padding: 28px 24px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(214, 140, 69, 0.14), rgba(214, 140, 69, 0));
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.8vw, 2.2rem);
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    main {
      padding: 24px;
      display: grid;
      gap: 24px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: #fff;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1.12rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d6dbe5;
      border-radius: 10px;
      font-size: 0.95rem;
      background: #fffeff;
    }

    input:focus {
      outline: 2px solid rgba(214, 140, 69, 0.35);
      border-color: var(--accent);
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: white;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 120ms ease, background 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    button.secondary {
      background: #4f607a;
    }

    button.warn {
      background: var(--danger);
    }

    .status {
      margin-top: 8px;
      min-height: 22px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .status.ok {
      color: var(--success);
    }

    .status.err {
      color: var(--danger);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid #ebedf2;
      text-align: left;
    }

    th {
      background: #f7f9fc;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #34445f;
    }

    .mini {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      color: var(--muted);
      margin-top: 10px;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
      }

      main {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      th,
      td {
        padding: 8px;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Campus Nutrition Redis Leaderboard</h1>
      <p class="sub">Track each user's most viewed menu items with Redis sorted sets.</p>
    </header>

    <main>
      <section class="card">
        <h2>Create Item</h2>
        <div class="grid">
          <div>
            <label for="createUser">User ID</label>
            <input id="createUser" placeholder="user_001" />
          </div>
          <div>
            <label for="createItemId">Item ID</label>
            <input id="createItemId" placeholder="item_001" />
          </div>
          <div>
            <label for="createItemName">Item Name</label>
            <input id="createItemName" placeholder="Grilled Chicken Bowl" />
          </div>
          <div>
            <label for="createViews">Initial Views</label>
            <input id="createViews" type="number" min="0" value="1" />
          </div>
        </div>
        <div class="actions">
          <button onclick="createItem()">Create</button>
        </div>
      </section>

      <section class="card">
        <h2>Load Leaderboard</h2>
        <div class="grid">
          <div>
            <label for="loadUser">User ID</label>
            <input id="loadUser" placeholder="user_001" />
          </div>
          <div>
            <label for="loadLimit">Top N</label>
            <input id="loadLimit" type="number" min="1" value="10" />
          </div>
        </div>
        <div class="actions">
          <button class="secondary" onclick="loadLeaderboard()">Load</button>
          <button class="warn" onclick="deleteLeaderboard()">Delete Leaderboard</button>
        </div>
        <div id="status" class="status"></div>
        <div id="results"></div>
      </section>
    </main>
  </div>

  <script>
    const API = "/api/most-viewed";

    function setStatus(message, ok = true) {
      const el = document.getElementById("status");
      el.textContent = message;
      el.className = ok ? "status ok" : "status err";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function handleResponse(response) {
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || "Request failed");
      }
      return body;
    }

    async function createItem() {
      const userId = document.getElementById("createUser").value.trim();
      const itemId = document.getElementById("createItemId").value.trim();
      const itemName = document.getElementById("createItemName").value.trim();
      const views = Number(document.getElementById("createViews").value);

      if (!userId || !itemId || !itemName) {
        setStatus("User ID, Item ID, and Item Name are required.", false);
        return;
      }

      try {
        await handleResponse(
          await fetch(`${API}/${encodeURIComponent(userId)}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ itemId, itemName, views }),
          })
        );

        setStatus("Item created in Redis leaderboard.");
        document.getElementById("loadUser").value = userId;
        await loadLeaderboard();
      } catch (error) {
        setStatus(error.message, false);
      }
    }

    async function loadLeaderboard() {
      const userId = document.getElementById("loadUser").value.trim();
      const limit = Number(document.getElementById("loadLimit").value);
      const results = document.getElementById("results");

      if (!userId) {
        setStatus("User ID is required to load a leaderboard.", false);
        return;
      }

      try {
        const data = await handleResponse(
          await fetch(`${API}/${encodeURIComponent(userId)}?limit=${encodeURIComponent(limit)}`)
        );

        if (!data.items.length) {
          results.innerHTML = '<p class="empty">No items found for this user.</p>';
          setStatus("Leaderboard loaded.");
          return;
        }

        let html = '<table><thead><tr><th>Item ID</th><th>Item Name</th><th>Views</th><th>Actions</th></tr></thead><tbody>';
        data.items.forEach((item) => {
          html += `<tr>
            <td>${escapeHtml(item.itemId)}</td>
            <td>${escapeHtml(item.itemName)}</td>
            <td>${escapeHtml(item.views)}</td>
            <td>
              <div class="mini">
                <button class="secondary" onclick="incrementItem('${encodeURIComponent(userId)}','${encodeURIComponent(item.itemId)}')">+1 View</button>
                <button class="secondary" onclick="updateItem('${encodeURIComponent(userId)}','${encodeURIComponent(item.itemId)}','${encodeURIComponent(item.itemName)}',${Number(item.views)})">Edit</button>
                <button class="warn" onclick="deleteItem('${encodeURIComponent(userId)}','${encodeURIComponent(item.itemId)}')">Delete</button>
              </div>
            </td>
          </tr>`;
        });
        results.innerHTML = `${html}</tbody></table>`;
        setStatus("Leaderboard loaded.");
      } catch (error) {
        results.innerHTML = "";
        setStatus(error.message, false);
      }
    }

    async function incrementItem(userIdEnc, itemIdEnc) {
      try {
        const userId = decodeURIComponent(userIdEnc);
        const itemId = decodeURIComponent(itemIdEnc);
        await handleResponse(
          await fetch(`${API}/${encodeURIComponent(userId)}/${encodeURIComponent(itemId)}/increment`, {
            method: "PATCH",
          })
        );
        setStatus("Item view count incremented.");
        await loadLeaderboard();
      } catch (error) {
        setStatus(error.message, false);
      }
    }

    async function updateItem(userIdEnc, itemIdEnc, itemNameEnc, currentViews) {
      const userId = decodeURIComponent(userIdEnc);
      const itemId = decodeURIComponent(itemIdEnc);
      const currentName = decodeURIComponent(itemNameEnc);
      const nextName = prompt("New item name:", currentName);
      if (nextName === null) return;
      const nextViewsRaw = prompt("New exact views:", String(currentViews));
      if (nextViewsRaw === null) return;
      const nextViews = Number(nextViewsRaw);

      if (!nextName.trim() || !Number.isFinite(nextViews) || nextViews < 0) {
        setStatus("Update cancelled. Name and non-negative views are required.", false);
        return;
      }

      try {
        await handleResponse(
          await fetch(`${API}/${encodeURIComponent(userId)}/${encodeURIComponent(itemId)}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ itemName: nextName.trim(), views: nextViews }),
          })
        );
        setStatus("Item updated.");
        await loadLeaderboard();
      } catch (error) {
        setStatus(error.message, false);
      }
    }

    async function deleteItem(userIdEnc, itemIdEnc) {
      try {
        const userId = decodeURIComponent(userIdEnc);
        const itemId = decodeURIComponent(itemIdEnc);
        await handleResponse(
          await fetch(`${API}/${encodeURIComponent(userId)}/${encodeURIComponent(itemId)}`, {
            method: "DELETE",
          })
        );
        setStatus("Item deleted.");
        await loadLeaderboard();
      } catch (error) {
        setStatus(error.message, false);
      }
    }

    async function deleteLeaderboard() {
      const userId = document.getElementById("loadUser").value.trim();
      if (!userId) {
        setStatus("User ID is required.", false);
        return;
      }
      if (!confirm(`Delete leaderboard for ${userId}?`)) {
        return;
      }

      try {
        await handleResponse(
          await fetch(`${API}/${encodeURIComponent(userId)}`, {
            method: "DELETE",
          })
        );
        setStatus("Leaderboard deleted.");
        document.getElementById("results").innerHTML = "";
      } catch (error) {
        setStatus(error.message, false);
      }
    }
  </script>
</body>
</html>
